# Replace spark_catalog with Nessie catalog
spark.sql.catalog.nessie              org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nessie.type         nessie
spark.sql.catalog.nessie.uri          http://nessie:19120/api/v1
spark.sql.catalog.nessie.ref          main
spark.sql.catalog.nessie.warehouse    s3a://warehouse/  # <- This is YOUR CATALOG_WAREHOUSE

# FileIO configuration (similar to your CATALOG_IO__IMPL)
spark.sql.catalog.nessie.io-impl      org.apache.iceberg.aws.s3.S3FileIO
# Or use HadoopFileIO:
# spark.sql.catalog.nessie.io-impl    org.apache.iceberg.hadoop.HadoopFileIO

# MinIO/S3 configuration (same as you have)
spark.hadoop.fs.s3a.endpoint          http://minio:9000
spark.hadoop.fs.s3a.access.key        minioadmin
spark.hadoop.fs.s3a.secret.key        minioadmin
spark.hadoop.fs.s3a.path.style.access true
# JAR dependencies (can also be added via --packages)
spark.jars.packages                   org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.0,org.apache.hadoop:hadoop-aws:3.3.4
