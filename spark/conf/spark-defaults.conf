# Spark Configuration for Iceberg with MinIO
spark.sql.extensions                        org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.spark_catalog             org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.spark_catalog.type        hadoop
spark.sql.catalog.spark_catalog.warehouse   s3a://oracle-cdc

# MinIO Configuration
spark.hadoop.fs.s3a.endpoint                http://minio:9000
spark.hadoop.fs.s3a.access.key              minioadmin
spark.hadoop.fs.s3a.secret.key              minioadmin
spark.hadoop.fs.s3a.path.style.access       true
spark.hadoop.fs.s3a.impl                    org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled  false

# Additional Hadoop S3A optimizations
spark.hadoop.fs.s3a.multipart.size          104857600
spark.hadoop.fs.s3a.fast.upload             true
spark.hadoop.fs.s3a.fast.upload.buffer      disk
spark.hadoop.fs.s3a.threads.max             20

# Iceberg specific configurations
spark.sql.catalog.spark_catalog.io-impl     org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.spark_catalog.cache-enabled true
spark.sql.catalog.spark_catalog.cache.expiration-interval-ms 300000

# JAR dependencies (can also be added via --packages)
spark.jars.packages                         org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.0,org.apache.hadoop:hadoop-aws:3.3.4
