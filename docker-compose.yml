services:
  oracle:
    image: container-registry.oracle.com/database/enterprise:19.3.0.0
    container_name: dbz_oracle19
    ports:
      - "1522:1521"
    environment:
      ORACLE_SID: ORCLCDB
      ORACLE_PDB: ORCLPDB1
      INIT_SGA_SIZE: 3000          # Increased from 750 (better memory allocation)
      INIT_PGA_SIZE: 1000           # Increased from 250
      ORACLE_PWD: oraclepw
      ORACLE_CHARACTERSET: AL32UTF8
      # Disable less critical features for faster startup:
      ENABLE_FORCE_LOGGING: "false"
      ENABLE_GOLDENGATE_REPLICATION: "false"
    volumes:
      - ./oradata:/opt/oracle/oradata
    networks:
      - debezium-net
    # Performance optimizations:
    tmpfs:
      - /dev/shm:rw,noexec,nosuid,size=4g    # RAM disk for faster I/O
    shm_size: 4g                              # Shared memory (critical for Oracle)
    ulimits:
      memlock:
        soft: -1                               # Unlimited memlock for performance
        hard: -1
      nofile:
        soft: 65536                            # Increase file descriptor limits
        hard: 65536

  kafka:
    image: confluentinc/cp-kafka:8.1.3
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      # KRaft mode configuration
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Listeners configuration
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Topic configuration
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - debezium-net
    volumes:
      - ./data/kafka:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  connect:
    image: confluentinc/cp-kafka-connect:8.1.3
    container_name: connect
    hostname: connect
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_GROUP_ID: "1"
      CONNECT_CONFIG_STORAGE_TOPIC: my_connect_configs
      CONNECT_OFFSET_STORAGE_TOPIC: my_connect_offsets
      CONNECT_STATUS_STORAGE_TOPIC: my_connect_statuses
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/java/debezium-oracle,/usr/share/confluent-hub-components,/usr/share/java/kafka-connect-s3"
      CONNECT_PREFLIGHT_CHECK_ENABLED: "false"
      CONNECT_KEY_CONVERTER: "io.confluent.connect.avro.AvroConverter"
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      CONNECT_VALUE_CONVERTER: "io.confluent.connect.avro.AvroConverter"
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      CONNECT_REST_ADVERTISED_HOST_NAME: "connect"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./debezium-oracle:/usr/share/java/debezium-oracle
      - ./kafka-connect-s3:/usr/share/java/kafka-connect-s3
      - ./connectors:/etc/kafka-connect/connectors:ro
    networks:
      - debezium-net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_REGION: us-east-1
    command: server /data --console-address ":9001"
    volumes:
      - ./miniodata:/data
    networks:
      - debezium-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  schema-registry:
    image: confluentinc/cp-schema-registry:8.1.3
    container_name: schema-registry
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
    networks:
      - debezium-net
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      - kafka
      - schema-registry
      - connect
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: "local-debezium-cluster"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: "http://schema-registry:8081"
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: "kafka-connect"
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: "http://connect:8083"
    networks:
      - debezium-net
    restart: unless-stopped

  spark-iceberg:
    image: tabulario/spark-iceberg
    container_name: spark-iceberg
    networks:
      - debezium-net
    depends_on:
      - minio
      - nessie
    volumes:
      - ./warehouse:/home/iceberg/warehouse
      - ./notebooks:/home/iceberg/notebooks/notebooks
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./spark.py:/opt/spark/spark.py
      - ./jars/openlineage-spark.jar:/opt/spark/jars/openlineage-spark.jar
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
    ports:
      - 8888:8888
      - 8082:8080
      - 10000:10000
      - 10001:10001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "pip install clickhouse-connect || true"]
      interval: 30s
      timeout: 10s
      retries: 3

  nessie:
    image: ghcr.io/projectnessie/nessie:0.104.1
    container_name: nessie
    networks:
      - debezium-net
    ports:
      - 19120:19120
    volumes:
      - ./nessie-data:/nessie/data
    environment:
      - nessie.version.store.type=ROCKSDB
      - nessie.version.store.persist.rocks.database-path=/nessie/data
      - nessie.catalog.default-warehouse=warehouse
      - nessie.catalog.warehouses.warehouse.location=s3://oracle-cdc
      - nessie.catalog.service.s3.default-options.region=us-east-1
      - nessie.catalog.service.s3.default-options.endpoint=http://minio:9000/
      - nessie.catalog.service.s3.default-options.path-style-access=true
      - nessie.catalog.service.s3.default-options.access-key=urn:nessie-secret:quarkus:nessie.catalog.secrets.access-key
      - nessie.catalog.secrets.access-key.name=minioadmin
      - nessie.catalog.secrets.access-key.secret=minioadmin
      - nessie.server.authentication.enabled=false
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - CATALOG_WAREHOUSE=s3://warehouse/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
    restart: unless-stopped

  mc:
    depends_on:
      - minio
    image: minio/mc
    container_name: mc
    networks:
      - debezium-net
    entrypoint: ["sleep", "infinity"]
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9002:9000"
    volumes:
      - ./clickhouse/data:/var/lib/clickhouse
      - ./clickhouse/logs:/var/log/clickhouse-server
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - debezium-net
    restart: unless-stopped

  superset:
    image: apache/superset:latest
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "change_this_secret_key_to_something_secure"
      PYTHONPATH: "/app/superset_home/.local/lib/python3.10/site-packages"
    depends_on:
      - clickhouse
    networks:
      - debezium-net
    volumes:
      - ./:/app/superset_home
    command: >
      sh -c "
      pip install --user 'sqlalchemy==1.3.24' &&
      pip install --user 'clickhouse-connect' &&
      pip install --user 'clickhouse-sqlalchemy==0.2.5' &&
      superset fab create-admin --username admin --firstname Admin --lastname User --email admin@superset.com --password admin &&
      superset db upgrade &&
      superset init &&
      superset run -p 8088 --with-threads --reload --debugger -h 0.0.0.0
      "
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - debezium-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow:
    image: apache/airflow:2.8.1
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow
    user: root
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: change_this_secret_key
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: 81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs=
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 30  # Check for new DAGs every 30 seconds
      AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 30  # Process DAG files every 30 seconds
      AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: 60  # Increase timeout if DAGs are complex
      AIRFLOW__OPENLINEAGE__TRANSPORT: '{"type":"http","url":"http://marquez:5000"}'
    ports:
      - "8084:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - debezium-net
    command: bash -c "airflow db init && airflow users create -r Admin -u admin -e admin@example.com -f admin -l user -p admin || true && airflow webserver & airflow scheduler"
    restart: unless-stopped

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: dbeaverbrowser
    ports:
      - "8978:8978"
    volumes:
      - ./cloudbeaver_data:/opt/cloudbeaver/workspace
    environment:
      - CB_SERVER_NAME=CloudBeaver
      - CB_SERVER_URL=http://localhost:8978
      - CB_DATABASE_DRIVER=postgresql
    depends_on:
      - postgres
      - clickhouse
      - oracle
    networks:
      - debezium-net
    restart: unless-stopped

  dremio:
    image: dremio/dremio-oss:latest
    container_name: dremio
    ports:
      - "9047:9047"  # Web UI
      - "31010:31010"  # Client port (ODBC/JDBC)
      - "45678:45678"  # Internal communication
    environment:
      - DREMIO_JAVA_SERVER_EXTRA_OPTS=-XX:+UseG1GC -XX:+UseStringDeduplication
      - DREMIO_HEAP_SIZE_MB=4096  # Adjust based on your system
      - DREMIO_DIRECT_MEMORY_SIZE_MB=2048
    volumes:
      - ./dremio/data:/opt/dremio/data
      - ./dremio/logs:/opt/dremio/log
    depends_on:
      - minio
      - nessie
      - postgres
      - clickhouse
      - oracle
    networks:
      - debezium-net
    restart: unless-stopped  
  
  marquez-db:
    image: postgres:15
    container_name: marquez-db
    environment:
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    volumes:
      - ./marquez/postgres:/var/lib/postgresql/data
    networks:
      - debezium-net

  marquez:
    image: marquezproject/marquez:latest
    container_name: marquez
    ports:
      - "5000:5000"
    depends_on:
      - marquez-db
    environment:
      MARQUEZ_PORT: 5000
      POSTGRES_HOST: marquez-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    networks:
      - debezium-net

  marquez-web:
    image: marquezproject/marquez-web:latest
    container_name: marquez-web
    ports:
      - "3000:3000"
    depends_on:
      - marquez
    environment:
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: 5000
      WEB_PORT: 3000
    networks:
      - debezium-net
    # Debezium UI - Web interface for managing Debezium connectors
  debezium-ui:
    image: debezium/debezium-ui:latest
    container_name: debezium-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CONNECT_URIS: http://connect:8083
    depends_on:
      - connect
      - kafka
    networks:
      - debezium-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  debezium-net:
    driver: bridge
